name: UFM Plugin Helm Template CI

on:
  workflow_dispatch:
  push:
    paths:
      - "ufm-plugin-helm-template/**"
      - ".github/workflows/helm-template-ci.yml"
  pull_request:
    paths:
      - "ufm-plugin-helm-template/**"
      - ".github/workflows/helm-template-ci.yml"

jobs:
  helm-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Validate UFM Plugin Helm Chart
        run: |
          set -e
          CHART=ufm-plugin-helm-template
          NS=ufm-enterprise

          for f in \
            ci-values.yaml \
            ci-values-empty-plugins.yaml \
            ci-values-watchdog-disabled.yaml \
            ci-values-multi-plugin.yaml \
            ci-values-per-plugin-disable.yaml \
            ci-values-affinity.yaml; do
            echo "--- lint + template: ${f} ---"
            helm lint "${CHART}" -f "${CHART}/${f}"
            helm template ufm-plugin-test "${CHART}" -f "${CHART}/${f}" -n "${NS}" --debug > /dev/null
          done

          echo "--- lint + template: examples/log-streamer-config.yaml ---"
          helm lint "${CHART}" -f "${CHART}/examples/log-streamer-config.yaml"
          helm template ufm-plugin-test "${CHART}" -f "${CHART}/examples/log-streamer-config.yaml" -n "${NS}" --debug > /dev/null

          echo "All helm chart validations passed."
