name: UFM Plugin Helm Template CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "ufm-plugin-helm-template/**"
      - ".github/workflows/helm-template-ci.yml"

jobs:
  helm-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Validate UFM Plugin Helm Chart
        run: |
          set -e
          echo "Validating ufm-plugin-helm-template..."
          helm lint ufm-plugin-helm-template -f ufm-plugin-helm-template/ci-values.yaml
          helm template ufm-plugin-test ufm-plugin-helm-template -f ufm-plugin-helm-template/ci-values.yaml -n ufm-enterprise --debug > /dev/null
          echo "Validating with empty plugins (ConfigMaps only, no Deployments)..."
          helm template ufm-plugin-test ufm-plugin-helm-template -f ufm-plugin-helm-template/ci-values-empty-plugins.yaml -n ufm-enterprise --debug > /dev/null
          echo "Validating with example log-streamer config..."
          helm template ufm-plugin-test ufm-plugin-helm-template -f ufm-plugin-helm-template/examples/log-streamer-config.yaml -n ufm-enterprise --debug > /dev/null
          echo "Validating ClusterIP Service + plugins.yaml host (ci-values-service.yaml)..."
          helm template ufm-plugin-test ufm-plugin-helm-template \
            -f ufm-plugin-helm-template/ci-values-service.yaml -n ufm-enterprise --debug > /tmp/ufm-plugin-helm-out.yaml
          test "$(grep -c '^kind: Service$' /tmp/ufm-plugin-helm-out.yaml)" -eq 1
          grep -q 'type: ClusterIP' /tmp/ufm-plugin-helm-out.yaml
          grep -q 'name: ufm-ufm-enterprise-plugin-ci-test-plugin' /tmp/ufm-plugin-helm-out.yaml
          grep -q 'host: ufm-ufm-enterprise-plugin-ci-test-plugin.ufm-enterprise.svc.cluster.local' /tmp/ufm-plugin-helm-out.yaml
          SVC="$(awk '/^kind: Service$/,/^---$/' /tmp/ufm-plugin-helm-out.yaml)"
          echo "$SVC" | grep -q 'targetPort: 8080'
          echo "$SVC" | grep -q 'targetPort: 8443'
          echo "Helm chart validation passed."
