[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--disable-warnings"

[tool.ruff]
target-version = "py39"
include = ["state_mirror/**/*.py", "tests/**/*.py"]
line-length = 100

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PT", "SIM"]
ignore = ["PT009"]

[tool.ruff.lint.flake8-pytest-style]
# Pin PT001 explicitly: the default flipped between ruff versions, so set it
# so lint is deterministic regardless of the installed ruff.
fixture-parentheses = false

[tool.ruff.format]
indent-style = "space"
