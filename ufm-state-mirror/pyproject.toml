[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--disable-warnings"

# This component standardizes on ruff 0.6.9 (matches .github/workflows/
# state-mirror-ci.yml). Use that version locally -- the formatter's handling of
# dummy `...` bodies and some lint defaults differ across ruff releases, so an
# older ruff (e.g. 0.2.x) will disagree with CI on formatting.
[tool.ruff]
target-version = "py39"
include = ["state_mirror/**/*.py", "tests/**/*.py"]
line-length = 100

[tool.ruff.lint]
select = ["B", "E", "F", "I", "PT", "SIM"]
ignore = ["PT009"]

[tool.ruff.lint.flake8-pytest-style]
# Pin PT001 explicitly: the default flipped between ruff versions, so set it
# so lint is deterministic regardless of the installed ruff.
fixture-parentheses = false

[tool.ruff.format]
indent-style = "space"
