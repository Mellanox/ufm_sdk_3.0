{{- $ufmFullname := .Values.ufmFullname }}
{{- $namespace := include "ufm-plugin.namespace" . }}
{{- $pvcClaimName := include "ufm-plugin.pvcClaimName" . }}
{{- range .Values.plugins.items }}
{{- if and .name .image .tag }}
{{- $k8sName := .name | replace "_" "-" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  namespace: {{ $namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  template:
    metadata:
      labels:
        app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
        plugin-name: {{ $k8sName }}
    spec:
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: {{ $k8sName }}-init
          image: "{{ .image }}:{{ .tag }}"
          imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-c"]
          args:
            - /init.sh -ufm_version ${UFM_VERSION}
          env:
            - name: UFM_VERSION
              valueFrom:
                configMapKeyRef:
                  name: {{ $ufmFullname }}-config
                  key: UFM_VERSION
          securityContext:
            privileged: false
          resources:
            {{- if and $.Values.rdma.resourceName (ne (toString $.Values.rdma.resourceCount) "0") }}
            limits:
              {{ $.Values.rdma.resourceName }}: {{ $.Values.rdma.resourceCount }}
            {{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ .name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ .name }}
      containers:
        - name: {{ $k8sName }}
          image: "{{ .image }}:{{ .tag }}"
          imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            privileged: false
            {{- if and $.Values.rdma.resourceName (ne (toString $.Values.rdma.resourceCount) "0") }}
            capabilities:
              add:
                - IPC_LOCK
            {{- end }}
          env:
{{- if .port }}
            - name: PLUGIN_PORT
              value: "{{ .port }}"
{{- end }}
{{- if .healthEndpoint }}
            - name: HEALTH_ENDPOINT
              value: "{{ .healthEndpoint }}"
{{- if or .healthPort .port }}
            - name: HEALTH_PORT
              value: "{{ .healthPort | default .port }}"
{{- end }}
{{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ .name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ .name }}
            - name: health-scripts
              mountPath: /health-scripts
              readOnly: true
          resources:
            {{- $res := .resources | default $.Values.plugins.defaultResources }}
            {{- if $res.requests }}
            requests:
              {{- toYaml $res.requests | nindent 14 }}
            {{- end }}
            limits:
              {{- if $res.limits }}
              {{- toYaml $res.limits | nindent 14 }}
              {{- end }}
              {{- if and $.Values.rdma.resourceName (ne (toString $.Values.rdma.resourceCount) "0") }}
              {{ $.Values.rdma.resourceName }}: {{ $.Values.rdma.resourceCount }}
              {{- end }}
          {{- if .livenessProbe }}
          livenessProbe:
            {{- toYaml .livenessProbe | nindent 12 }}
          {{- else }}
          # Default liveness: chart-provided health-check.sh (set healthEndpoint/port so the script can check the plugin)
          livenessProbe:
            exec:
              command: ["/bin/sh", "/health-scripts/health-check.sh"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          {{- end }}
          {{- with .readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: ufm-files
          persistentVolumeClaim:
            claimName: {{ $pvcClaimName }}
        - name: health-scripts
          configMap:
            name: {{ $ufmFullname }}-plugin-health-scripts
            defaultMode: 0755
{{- end }}
{{- end }}
