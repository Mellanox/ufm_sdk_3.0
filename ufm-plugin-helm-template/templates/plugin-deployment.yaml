{{- $ufmFullname := .Values.ufmFullname }}
{{- $namespace := include "ufm-plugin.namespace" . }}
{{- $pvcClaimName := include "ufm-plugin.pvcClaimName" . }}
{{- range $name := .Values.plugins.entries | keys | sortAlpha }}
{{- $plugin := index $.Values.plugins.entries $name }}
{{- $enabled := true }}{{- if hasKey $plugin "enabled" }}{{ $enabled = $plugin.enabled }}{{- end }}
{{- if and $enabled $plugin.image $plugin.tag }}
{{- $k8sName := $name | replace "_" "-" }}
{{- $pluginRdma := $plugin.rdma | default $.Values.rdma }}
{{- $watchdogEnabled := $.Values.watchdog.enabled }}
{{- if and $plugin.watchdog (hasKey $plugin.watchdog "enabled") }}
  {{- $watchdogEnabled = $plugin.watchdog.enabled }}
{{- end }}
{{- $restartThreshold := $.Values.watchdog.restartThreshold | default 3 }}
{{- if and $plugin.watchdog $plugin.watchdog.restartThreshold }}
  {{- $restartThreshold = $plugin.watchdog.restartThreshold }}
{{- end }}
{{- $timeWindowSeconds := $.Values.watchdog.timeWindowSeconds | default 120 }}
{{- if and $plugin.watchdog $plugin.watchdog.timeWindowSeconds }}
  {{- $timeWindowSeconds = $plugin.watchdog.timeWindowSeconds }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  namespace: {{ $namespace }}
spec:
  replicas: 1
  strategy:
    type: {{ $plugin.strategy | default "Recreate" }}
  selector:
    matchLabels:
      app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  template:
    metadata:
      labels:
        app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
        plugin-name: {{ $k8sName }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: plugin
        {{- if $watchdogEnabled }}
        ufm.nvidia.com/watchdog-scope: plugin
        {{- end }}
      {{- if or $watchdogEnabled $plugin.mountHealthScripts }}
      annotations:
        {{- if $watchdogEnabled }}
        ufm.nvidia.com/watchdog-restart-threshold: "{{ $restartThreshold }}"
        ufm.nvidia.com/watchdog-time-window-seconds: "{{ $timeWindowSeconds }}"
        {{- end }}
        {{- if $plugin.mountHealthScripts }}
        checksum/health-scripts: {{ include (print $.Template.BasePath "/plugin-health-configmap.yaml") $ | sha256sum }}
        {{- end }}
      {{- end }}
    spec:
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $affinity := deepCopy ($.Values.affinity | default dict) }}
      {{- if $watchdogEnabled }}
      {{- $matchExpr := dict "key" (printf "ufm.nvidia.com/%s-unhealthy" $k8sName) "operator" "NotIn" "values" (list "true") }}
      {{- $nodeSelectorTerm := dict "matchExpressions" (list $matchExpr) }}
      {{- $required := dict "nodeSelectorTerms" (list $nodeSelectorTerm) }}
      {{- $_ := set $affinity "nodeAffinity" (dict "requiredDuringSchedulingIgnoredDuringExecution" $required) }}
      {{- end }}
      {{- with $affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not (eq $plugin.runInitContainer false) }}
      initContainers:
        - name: {{ $k8sName }}-init
          image: "{{ $plugin.image }}:{{ $plugin.tag }}"
          imagePullPolicy: {{ $plugin.imagePullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-c"]
          args:
            - /init.sh -ufm_version ${UFM_VERSION}
          env:
            - name: UFM_VERSION
              valueFrom:
                configMapKeyRef:
                  name: {{ $ufmFullname }}-config
                  key: UFM_VERSION
          securityContext:
            privileged: false
            {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
            capabilities:
              add:
                - IPC_LOCK
            {{- end }}
          {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
          resources:
            limits:
              {{ $pluginRdma.resourceName }}: {{ $pluginRdma.resourceCount }}
          {{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /opt/ufm/files
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ $name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ $name }}
      {{- end }}
      containers:
        - name: {{ $k8sName }}
          image: "{{ $plugin.image }}:{{ $plugin.tag }}"
          imagePullPolicy: {{ $plugin.imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            privileged: false
            {{- if or (and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0")) $plugin.extraCapabilities }}
            capabilities:
              add:
                {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
                - IPC_LOCK
                {{- end }}
                {{- with $plugin.extraCapabilities }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
            {{- end }}
          {{- if or $plugin.port $plugin.ports }}
          ports:
            {{- if $plugin.port }}
            - name: http
              containerPort: {{ $plugin.port }}
              protocol: TCP
            {{- end }}
            {{- range $plugin.ports | default list }}
            - name: port-{{ . }}
              containerPort: {{ . }}
              protocol: TCP
            {{- end }}
          {{- end }}
          env:
            {{- if $plugin.port }}
            - name: PLUGIN_PORT
              value: "{{ $plugin.port }}"
            {{- end }}
            {{- if $plugin.healthEndpoint }}
            - name: HEALTH_ENDPOINT
              value: "{{ $plugin.healthEndpoint }}"
            {{- if or $plugin.healthPort $plugin.port }}
            - name: HEALTH_PORT
              value: "{{ $plugin.healthPort | default $plugin.port }}"
            {{- end }}
            {{- end }}
            {{- with $plugin.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /opt/ufm/files
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ $name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ $name }}
            {{- if $plugin.mountHealthScripts }}
            - name: health-scripts
              mountPath: /health-scripts
              readOnly: true
            {{- end }}
            {{- with $plugin.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $res := $plugin.resources | default $.Values.plugins.defaultResources }}
          {{- $hasRequests := $res.requests }}
          {{- $hasLimits := or $res.limits (and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0")) }}
          {{- if or $hasRequests $hasLimits }}
          resources:
            {{- if $res.requests }}
            requests:
              {{- toYaml $res.requests | nindent 14 }}
            {{- end }}
            {{- if $hasLimits }}
            limits:
              {{- if $res.limits }}
              {{- toYaml $res.limits | nindent 14 }}
              {{- end }}
              {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
              {{ $pluginRdma.resourceName }}: {{ $pluginRdma.resourceCount }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with $plugin.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if not $plugin.disableLivenessProbe }}
            {{- if $plugin.livenessProbe }}
          livenessProbe:
            {{- toYaml $plugin.livenessProbe | nindent 12 }}
            {{- else }}
              {{- if $plugin.healthEndpoint }}
          livenessProbe:
            httpGet:
              path: {{ $plugin.healthEndpoint }}
              port: {{ $plugin.healthPort | default $plugin.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
              {{- else }}
                {{- if $plugin.port }}
          livenessProbe:
            tcpSocket:
              port: {{ $plugin.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with $plugin.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: ufm-files
          persistentVolumeClaim:
            claimName: {{ $pvcClaimName }}
        {{- if $plugin.mountHealthScripts }}
        - name: health-scripts
          configMap:
            name: {{ $ufmFullname }}-plugin-health-scripts
            defaultMode: 0755
        {{- end }}
        {{- with $plugin.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
