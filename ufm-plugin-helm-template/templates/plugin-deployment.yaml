{{- $ufmFullname := .Values.ufmFullname }}
{{- $namespace := include "ufm-plugin.namespace" . }}
{{- $pvcClaimName := include "ufm-plugin.pvcClaimName" . }}
{{- range .Values.plugins.items }}
{{- if and .name .image .tag }}
{{- $k8sName := .name | replace "_" "-" }}
{{- $pluginRdma := .rdma | default $.Values.rdma }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  namespace: {{ $namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
  template:
    metadata:
      labels:
        app: {{ $ufmFullname }}-plugin-{{ $k8sName }}
        plugin-name: {{ $k8sName }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
    spec:
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not (eq .runInitContainer false) }}
      initContainers:
        - name: {{ $k8sName }}-init
          image: "{{ .image }}:{{ .tag }}"
          imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-c"]
          args:
            - /init.sh -ufm_version ${UFM_VERSION}
          env:
            - name: UFM_VERSION
              valueFrom:
                configMapKeyRef:
                  name: {{ $ufmFullname }}-config
                  key: UFM_VERSION
          securityContext:
            privileged: false
            {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
            capabilities:
              add:
                - IPC_LOCK
            {{- end }}
          {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
          resources:
            limits:
              {{ $pluginRdma.resourceName }}: {{ $pluginRdma.resourceCount }}
          {{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ .name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ .name }}
      {{- end }}
      containers:
        - name: {{ $k8sName }}
          image: "{{ .image }}:{{ .tag }}"
          imagePullPolicy: {{ .imagePullPolicy | default "IfNotPresent" }}
          securityContext:
            privileged: false
            {{- if or (and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0")) .extraCapabilities }}
            capabilities:
              add:
                {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
                - IPC_LOCK
                {{- end }}
                {{- with .extraCapabilities }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
            {{- end }}
          {{- if or .port .ports }}
          ports:
            {{- if .port }}
            - name: http
              containerPort: {{ .port }}
              protocol: TCP
            {{- end }}
            {{- range .ports | default list }}
            - name: port-{{ . }}
              containerPort: {{ . }}
              protocol: TCP
            {{- end }}
          {{- end }}
          env:
            {{- if .port }}
            - name: PLUGIN_PORT
              value: "{{ .port }}"
            {{- end }}
            {{- if .healthEndpoint }}
            - name: HEALTH_ENDPOINT
              value: "{{ .healthEndpoint }}"
            {{- if or .healthPort .port }}
            - name: HEALTH_PORT
              value: "{{ .healthPort | default .port }}"
            {{- end }}
            {{- end }}
            {{- with .env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: ufm-files
              mountPath: /config
              subPath: conf/plugins/{{ .name }}
            - name: ufm-files
              mountPath: /log
              subPath: log/plugins/{{ .name }}
            {{- if .mountHealthScripts }}
            - name: health-scripts
              mountPath: /health-scripts
              readOnly: true
            {{- end }}
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- $res := .resources | default $.Values.plugins.defaultResources }}
          {{- $hasRequests := $res.requests }}
          {{- $hasLimits := or $res.limits (and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0")) }}
          {{- if or $hasRequests $hasLimits }}
          resources:
            {{- if $res.requests }}
            requests:
              {{- toYaml $res.requests | nindent 14 }}
            {{- end }}
            {{- if $hasLimits }}
            limits:
              {{- if $res.limits }}
              {{- toYaml $res.limits | nindent 14 }}
              {{- end }}
              {{- if and $pluginRdma.resourceName (ne (toString $pluginRdma.resourceCount) "0") }}
              {{ $pluginRdma.resourceName }}: {{ $pluginRdma.resourceCount }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with .startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if not .disableLivenessProbe }}
            {{- if .livenessProbe }}
          livenessProbe:
            {{- toYaml .livenessProbe | nindent 12 }}
            {{- else }}
              {{- if .healthEndpoint }}
          # Default liveness: native httpGet (set healthEndpoint and healthPort/port)
          livenessProbe:
            httpGet:
              path: {{ .healthEndpoint }}
              port: {{ .healthPort | default .port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
              {{- else }}
                {{- if .port }}
          # Default liveness: native tcpSocket (set port)
          livenessProbe:
            tcpSocket:
              port: {{ .port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
                {{- end }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- with .readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: ufm-files
          persistentVolumeClaim:
            claimName: {{ $pvcClaimName }}
        {{- if .mountHealthScripts }}
        - name: health-scripts
          configMap:
            name: {{ $ufmFullname }}-plugin-health-scripts
            defaultMode: 0755
        {{- end }}
        {{- with .volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
