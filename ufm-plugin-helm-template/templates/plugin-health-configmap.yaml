{{- /* Only emit health-scripts ConfigMap when there are plugins; script is for optional custom exec probes. Default liveness uses native httpGet/tcpSocket. */}}
{{- if .Values.plugins.items }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.ufmFullname }}-plugin-health-scripts
  namespace: {{ include "ufm-plugin.namespace" . }}
data:
  health-check.sh: |
{{ .Files.Get "scripts/health-check.sh" | nindent 4 }}
{{- end }}
