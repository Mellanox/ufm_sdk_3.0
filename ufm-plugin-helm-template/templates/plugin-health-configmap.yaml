{{- /* Only emit health-scripts ConfigMap when at least one plugin mounts it (mountHealthScripts: true). Default liveness uses native httpGet/tcpSocket. */}}
{{- if include "ufm-plugin.anyMountHealthScripts" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.ufmFullname }}-plugin-health-scripts
  namespace: {{ include "ufm-plugin.namespace" . }}
data:
  health-check.sh: |
{{ .Files.Get "scripts/health-check.sh" | nindent 4 }}
{{- end }}
