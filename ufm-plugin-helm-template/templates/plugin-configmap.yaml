apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ufm-plugin.configMapName" . }}
  namespace: {{ include "ufm-plugin.namespace" . }}
data:
  plugins.yaml: |
    plugins:
{{- if .Values.plugins.items }}
{{- range .Values.plugins.items }}
      - name: {{ .name }}
        host: {{ .host | default "127.0.0.1" }}
{{- if .port }}
        port: {{ .port }}
{{- end }}
        tag: {{ .tag }}
{{- end }}
{{- else }}
      []
{{- end }}
