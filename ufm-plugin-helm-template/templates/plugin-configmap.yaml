apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ufm-plugin.configMapName" . }}
  namespace: {{ include "ufm-plugin.namespace" . }}
data:
  plugins.yaml: |
    plugins:
{{- $hasEnabled := false }}
{{- range $name := .Values.plugins.entries | keys | sortAlpha }}
{{- $plugin := index $.Values.plugins.entries $name }}
{{- $enabled := true }}{{- if hasKey $plugin "enabled" }}{{ $enabled = $plugin.enabled }}{{- end }}
{{- if and $enabled $plugin.image $plugin.tag }}
{{- $hasEnabled = true }}
      - name: {{ $name }}
        host: {{ $plugin.host | default (printf "%s-plugin-%s.%s.svc.cluster.local" $.Values.ufmFullname ($name | replace "_" "-") (include "ufm-plugin.namespace" $)) }}
{{- if $plugin.port }}
        port: {{ $plugin.port }}
{{- end }}
        tag: {{ $plugin.tag }}
{{- end }}
{{- end }}
{{- if not $hasEnabled }}
      []
{{- end }}
