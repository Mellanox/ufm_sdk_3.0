ufmFullname: "ufm-ufm-enterprise"
# namespace: when namespaceSearchList is set and Helm has cluster access, discovered by looking up ConfigMap {ufmFullname}-config in each listed namespace only (no cluster-wide list). Otherwise defaults to "ufm-enterprise".
namespace: ""
# namespaceSearchList: namespaces to search for {ufmFullname}-config at install time. Only requires get ConfigMap in those namespaces. Set to [] to skip discovery.
namespaceSearchList: ["ufm-enterprise"]
existingClaim: ""
configMapName: ""

# RDMA/Infiniband device plugin resources (default "0"; set resourceCount to "1" when plugin uses /dev/infiniband).
# Each plugin can override with per-plugin rdma: { resourceName, resourceCount } so you can mix RDMA and non-RDMA plugins.
rdma:
  resourceName: "rdma/hca_shared"
  resourceCount: "0"

# Watchdog: opt plugin pods into UFM watchdog monitoring. When enabled, pods get labels for the watchdog operator
# to discover them and a node-exclusion rule so pods avoid nodes marked unhealthy for that plugin.
# Each plugin can override with per-plugin watchdog: { enabled, restartThreshold, timeWindowSeconds }.
watchdog:
  enabled: true
  restartThreshold: 3
  timeWindowSeconds: 120

plugins:
  defaultResources: {}  # optional: { requests: {...}, limits: {...} } applied when per-plugin .resources is not set
  items: []  # each item: name, image, tag; optional: port, ports, healthEndpoint, rdma, mountHealthScripts, startupProbe, etc.

# Optional: pod-level securityContext (runAsNonRoot, runAsUser, seccompProfile, etc.). Required for Pod Security Standards in many clusters.
# Example for restricted policy: podSecurityContext: { runAsNonRoot: true, runAsUser: 1000, seccompProfile: { type: RuntimeDefault } }
podSecurityContext: {}

# Optional: control where plugin pods are scheduled (e.g. same node as UFM, or specific node pools)
affinity: {}

tolerations: []
nodeSelector: {}
imagePullSecrets: []
