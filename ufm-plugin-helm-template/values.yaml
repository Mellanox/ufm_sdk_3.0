ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"
existingClaim: ""
configMapName: ""

# UFM base URL for health checks (default: in-cluster service from ufmFullname + namespace)
# Override if UFM is reached via different host/port (e.g. LoadBalancer or different cluster).
ufmUrl: ""

# RDMA/Infiniband device plugin resources (set resourceCount to "1" when plugin uses /dev/infiniband)
rdma:
  resourceName: "rdma/hca_shared"
  resourceCount: "0"

plugins:
  defaultResources: {}  # optional: { requests: {...}, limits: {...} } applied when per-plugin .resources is not set
  items: []

tolerations: []
nodeSelector: {}
imagePullSecrets: []
