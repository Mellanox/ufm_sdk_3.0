ufmFullname: "ufm-ufm-enterprise"
# namespace: when namespaceSearchList is set and Helm has cluster access, discovered by looking up ConfigMap {ufmFullname}-config in each listed namespace only (no cluster-wide list). Otherwise defaults to "ufm-enterprise".
namespace: ""
# namespaceSearchList: namespaces to search for {ufmFullname}-config at install time. Only requires get ConfigMap in those namespaces. Set to [] to skip discovery.
namespaceSearchList: ["ufm-enterprise"]
existingClaim: ""
configMapName: ""

# RDMA/Infiniband device plugin resources (default "0"; set resourceCount to "1" when plugin uses /dev/infiniband)
rdma:
  resourceName: "rdma/hca_shared"
  resourceCount: "0"

plugins:
  defaultResources: {}  # optional: { requests: {...}, limits: {...} } applied when per-plugin .resources is not set
  items: []

# Optional: control where plugin pods are scheduled (e.g. same node as UFM, or specific node pools)
affinity: {}

tolerations: []
nodeSelector: {}
imagePullSecrets: []
