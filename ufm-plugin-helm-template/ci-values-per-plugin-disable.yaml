# CI: validate per-plugin watchdog disable (chart-level enabled, one plugin opts out)
ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"

watchdog:
  enabled: true
  restartThreshold: 3
  timeWindowSeconds: 120

plugins:
  items:
    - name: watched_plugin
      image: busybox
      tag: "1.36"
      port: 8081
    - name: unwatched_plugin
      image: busybox
      tag: "1.36"
      port: 8082
      watchdog:
        enabled: false
