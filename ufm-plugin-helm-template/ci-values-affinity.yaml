# CI: validate user-provided affinity survives when watchdog injects nodeAffinity
ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"

watchdog:
  enabled: true
  restartThreshold: 3
  timeWindowSeconds: 120

affinity:
  podAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - ufm-ufm-enterprise
          topologyKey: kubernetes.io/hostname

plugins:
  entries:
    affinity_plugin:
      image: busybox
      tag: "1.36"
      port: 8080
