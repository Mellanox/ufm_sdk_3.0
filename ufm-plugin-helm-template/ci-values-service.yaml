# CI: exercise ClusterIP Service generation (UFM → plugin via in-cluster DNS).
# Extends the default CI plugin with an extra container port so the chart must render
# multiple Service ports (primary `port` + additional `ports`) without duplicates.
#
# Used by .github/workflows/helm-template-ci.yml to assert Service + plugins.yaml host alignment.

ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"
namespaceSearchList: []

rdma:
  resourceName: "rdma/hca_shared"
  resourceCount: "1"

plugins:
  entries:
    ci_test_plugin:
      image: busybox
      tag: "1.36"
      port: 8080
      ports:
        - 8443
      livenessProbe:
        tcpSocket: { port: 8080 }
        initialDelaySeconds: 30
        periodSeconds: 30
      readinessProbe:
        tcpSocket: { port: 8080 }
        initialDelaySeconds: 10
        periodSeconds: 10
