# CI Test Values - Used for helm lint and template validation
# These are not production values, only for CI testing.
# CI also runs helm template with ci-values-empty-plugins.yaml (no plugins) and examples/log-streamer-config.yaml.

ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"

rdma:
  resourceName: "rdma/hca_shared"
  resourceCount: "1"

watchdog:
  enabled: true
  restartThreshold: 3
  timeWindowSeconds: 120

plugins:
  entries:
    ci_test_plugin:
      image: busybox
      tag: "1.36"
      port: 8080
      livenessProbe:
        tcpSocket: { port: 8080 }
        initialDelaySeconds: 30
        periodSeconds: 30
      readinessProbe:
        tcpSocket: { port: 8080 }
        initialDelaySeconds: 10
        periodSeconds: 10
