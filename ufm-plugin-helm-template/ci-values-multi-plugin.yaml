# CI: validate chart with multiple plugins (each must get its own unhealthy-label node exclusion)
ufmFullname: "ufm-ufm-enterprise"
namespace: "ufm-enterprise"

watchdog:
  enabled: true
  restartThreshold: 3
  timeWindowSeconds: 120

plugins:
  items:
    - name: plugin_alpha
      image: busybox
      tag: "1.36"
      port: 8081
    - name: plugin_beta
      image: busybox
      tag: "1.36"
      port: 8082
      watchdog:
        restartThreshold: 10
        timeWindowSeconds: 300
